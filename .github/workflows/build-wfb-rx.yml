# Builds the ardudeck-wfb-rx sidecar (tools/wfb-rx) for the three desktop
# platforms and attaches the binaries to a release when a wfb-rx-v* tag is
# pushed. Asset names must match media-binaries-downloader.ensureWfbRx():
#   ardudeck-wfb-rx-<platform>-<arch>[.exe]   (platform = darwin|linux|win32)
name: Build wfb-rx

on:
  workflow_dispatch:
  push:
    tags:
      - 'wfb-rx-v*'
  pull_request:
    paths:
      - 'tools/wfb-rx/**'
      - '.github/workflows/build-wfb-rx.yml'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            asset: ardudeck-wfb-rx-darwin-arm64
          - os: macos-13
            asset: ardudeck-wfb-rx-darwin-x64
          - os: ubuntu-latest
            asset: ardudeck-wfb-rx-linux-x64
          - os: windows-latest
            asset: ardudeck-wfb-rx-win32-x64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install libusb libsodium pkg-config

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libusb-1.0-0-dev libsodium-dev libpcap-dev pkg-config

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          vcpkg install libusb:x64-windows libsodium:x64-windows
          echo "VCPKG_ROOT=$env:VCPKG_ROOT" >> $env:GITHUB_ENV

      - name: Configure
        working-directory: tools/wfb-rx
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        working-directory: tools/wfb-rx
        run: cmake --build build --config Release -j 4

      - name: Stage artifact (unix)
        if: runner.os != 'Windows'
        run: cp tools/wfb-rx/build/bin/ardudeck-wfb-rx "${{ matrix.asset }}"

      - name: Stage artifact (windows)
        if: runner.os == 'Windows'
        run: Copy-Item tools/wfb-rx/build/bin/Release/ardudeck-wfb-rx.exe "${{ matrix.asset }}" -ErrorAction SilentlyContinue; if (!(Test-Path "${{ matrix.asset }}")) { Copy-Item tools/wfb-rx/build/bin/ardudeck-wfb-rx.exe "${{ matrix.asset }}" }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/wfb-rx-v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}
